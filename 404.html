<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // SPA redirect for GitHub Pages
    // Converts the path into a query parameter and redirects to index.html
    // so React Router can handle client-side routing
    (function() {
      var location = window.location;
      var hostname = location.hostname;
      var pathname = location.pathname;
      var search = location.search;
      var hash = location.hash;

      // Enforce HTTPS
      if (location.protocol === 'http:') {
        window.location.replace('https://' + hostname + pathname + search + hash);
        return;
      }

      // Enforce non-www
      if (hostname.startsWith('www.')) {
        var nonWwwHostname = hostname.replace(/^www\./, '');
        window.location.replace('https://' + nonWwwHostname + pathname + search + hash);
        return;
      }

      // Encode the path + search + hash into a query string and redirect to /
      // The script in index.html will decode it and restore the URL via replaceState
      var redirectPath = pathname + search + hash;
      window.location.replace(
        location.protocol + '//' + hostname + '/?spa_redirect=' + encodeURIComponent(redirectPath)
      );
    })();
  </script>
</head>
<body>
  <h1>Redirecting...</h1>
  <p>If you are not redirected automatically, <a href="https://weddie.site">click here</a>.</p>
</body>
</html>
